<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดสอบการขับขี่ปลอดภัยและวินัยจราจร สกร.โนนสัง</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* ธีมจราจร: สีส้มเตือนภัย สีเหลือง สีเทาถนน */
    --primary: #ea580c; /* Orange 600 */
    --primary-dark: #c2410c; /* Orange 700 */
    --primary-light: #ffedd5; /* Orange 100 */
    --green: #15803d; --green-light: #f0fdf4; --green-mid: #bbf7d0;
    --red: #b91c1c; --red-light: #fef2f2; --red-mid: #fecaca;
    --amber-light: #fffbeb; --amber: #b45309;
    --gray-bg: #f1f5f9; --gray-card: #ffffff; --gray-border: #cbd5e1;
    --text: #1e293b; --text-muted: #64748b;
  }
  body { font-family: 'Sarabun', sans-serif; background: var(--gray-bg); color: var(--text); padding: 16px 8px; line-height: 1.6; }
  .container { max-width: 700px; margin: 0 auto; padding-bottom: 60px; }
  
  .header-card { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 26px; border-radius: 16px; margin-bottom: 16px; box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15); text-align: center; position: relative; overflow: hidden;}
  .header-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 6px; background: repeating-linear-gradient(90deg, #fbbf24, #fbbf24 20px, #1e293b 20px, #1e293b 40px); }
  .header-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #facc15; }
  .header-card p { font-size: 14.5px; opacity: 0.95; }

  .card { background: var(--gray-card); border: 1px solid var(--gray-border); border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  
  .emoji-banner { font-size: 56px; text-align: center; margin-bottom: 16px; margin-top: 8px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .form-control { width: 100%; padding: 12px 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-family: 'Sarabun', sans-serif; font-size: 15px; transition: all 0.2s; }
  .form-control:focus { outline: none; border-color: var(--primary); background-color: var(--primary-light); }
  
  .progress-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; font-size: 13.5px; color: var(--text-muted); font-weight: 600; }
  .progress-bar-bg { background: #e2e8f0; height: 10px; border-radius: 5px; flex-grow: 1; margin: 0 12px; position: relative; overflow: hidden; }
  .progress-bar-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s ease; border-radius: 5px; }

  .question-text { font-size: 17px; font-weight: 600; margin-bottom: 20px; color: var(--text); white-space: pre-line; background: #f8fafc; padding: 16px; border-radius: 10px; border-left: 5px solid var(--primary); box-shadow: inset 0 1px 3px rgba(0,0,0,0.02); line-height: 1.5;}
  .hint-box { background: var(--amber-light); border-left: 4px solid var(--amber); padding: 12px 16px; border-radius: 4px 8px 8px 4px; margin-bottom: 20px; font-size: 14px; color: var(--amber); }

  .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .option-item { display: flex; align-items: flex-start; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; background: white; font-size: 15.5px; }
  .option-item:hover { border-color: #cbd5e1; background: #f8fafc; }
  .option-item.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); font-weight: 600; }
  
  .option-item.correct-reveal { border-color: var(--green); background: var(--green-light); color: var(--green); font-weight: 600; }
  .option-item.wrong-reveal { border-color: var(--red); background: var(--red-light); color: var(--red); }
  .option-item.disabled { cursor: not-allowed; pointer-events: none; }

  .radio-dot { height: 20px; min-width: 20px; border: 2px solid #cbd5e1; border-radius: 50%; margin-right: 12px; margin-top: 2px; position: relative; display: inline-block; }
  .option-item.selected .radio-dot { border-color: var(--primary); }
  .option-item.selected .radio-dot::after { content: ''; position: absolute; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; top: 3px; left: 3px; }
  .option-item.correct-reveal .radio-dot { border-color: var(--green); }
  .option-item.correct-reveal .radio-dot::after { content: '✓'; color: var(--green); font-size: 14px; font-weight: bold; position: absolute; top: -3px; left: 3px; }
  .option-item.wrong-reveal .radio-dot { border-color: var(--red); }
  .option-item.wrong-reveal .radio-dot::after { content: '✕'; color: var(--red); font-size: 14px; font-weight: bold; position: absolute; top: -3px; left: 4px; }

  .rationale-box { padding: 16px; border-radius: 10px; font-size: 14.5px; margin-bottom: 20px; animation: fadeIn 0.3s ease; line-height: 1.5; }
  .rationale-box.correct { background: var(--green-light); border: 2px solid var(--green-mid); color: var(--green); }
  .rationale-box.wrong { background: var(--red-light); border: 2px solid var(--red-mid); color: var(--red); }

  .nav-actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 10px; }
  .btn { flex: 1; padding: 14px 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
  .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(234, 88, 12, 0.2); }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { background: #cbd5e1; color: #64748b; cursor: not-allowed; box-shadow: none; }
  .btn-secondary { background: #e2e8f0; color: var(--text); }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

  .summary-card { text-align: center; padding: 32px 24px; border: 3px solid var(--primary) !important; }
  .student-info-box { background: #f8fafc; border: 1px solid #cbd5e1; padding: 16px; border-radius: 12px; margin: 16px 0; text-align: left; }
  .student-info-box p { font-size: 14.5px; margin-bottom: 6px; color: var(--text); }
  
  .grade-pill { display: inline-block; padding: 8px 24px; border-radius: 25px; font-weight: 700; font-size: 16px; margin: 12px 0; }
  .grade-pass { background: var(--green-light); color: var(--green); border: 2px solid var(--green-mid); }
  .grade-fail { background: var(--red-light); color: var(--red); border: 2px solid var(--red-mid); }
  
  .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
  .stat-box { background: white; border: 2px solid var(--gray-border); padding: 16px 12px; border-radius: 12px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 700; }
  .slbl { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-top: 4px; }

  .analysis-card { background: #fef8f2; border: 1px solid #fdba74; border-radius: 12px; padding: 18px; margin: 20px 0; text-align: left; }
  .analysis-header { font-weight: 700; font-size: 16px; color: var(--primary-dark); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .analysis-item { font-size: 14px; margin-bottom: 10px; padding-left: 16px; position: relative; color: #334155; line-height: 1.5; }
  .analysis-item::before { content: "🚦"; position: absolute; left: -2px; font-size: 12px; top: 2px;}

  .review-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: left; border-bottom: 3px solid var(--primary); padding-bottom: 8px; color: var(--text); }
  .review-item { text-align: left; padding: 20px 0; border-bottom: 1px solid #e2e8f0; font-size: 14.5px; }
  .review-item:last-child { border-bottom: none; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
  <div class="header-card">
    <h1>โครงการอบรมผู้ขับขี่ปลอดภัย สกร.โนนสัง</h1>
    <p>แบบทดสอบวัดความรู้: การขับขี่ปลอดภัยและวินัยจราจร</p>
  </div>

  <div id="quiz-app"></div>
</div>

<script>
const quizData = {
  "questions": [
    {
      "strand": "กฎหมายและป้ายจราจร",
      "question": "เมื่อผู้ขับขี่พบป้ายจราจร 'หยุด' (Stop) ที่ทางแยกที่ไม่มีสัญญาณไฟจราจร ผู้ขับขี่ต้องปฏิบัติอย่างไรเป็นอันดับแรก?",
      "answerOptions": [
        { "text": "ชะลอความเร็ว บีบแตรเตือน แล้วขับผ่านไปได้เลย", "rationale": "ผิด ป้าย 'หยุด' บังคับให้รถต้องหยุดสนิททุกครั้ง ไม่ใช่แค่ชะลอความเร็ว", "isCorrect": false },
        { "text": "หยุดรถให้สนิทหลังเส้นหยุด มองซ้ายขวา เมื่อปลอดภัยจึงขับผ่านไป", "rationale": "ถูกต้อง! ป้ายหยุดบังคับให้รถต้องหยุดสนิท (Full Stop) หลังเส้นหยุดเสมอ เพื่อประเมินสถานการณ์ก่อนเคลื่อนที่", "isCorrect": true },
        { "text": "หยุดรถเฉพาะเมื่อมีรถคันอื่นขวางอยู่ หากไม่มีรถให้ขับผ่านได้ทันที", "rationale": "ผิด ตามกฎหมายต้องหยุดสนิททุกกรณี แม้จะดูเหมือนไม่มีรถมาก็ตาม", "isCorrect": false },
        { "text": "เร่งความเร็วเพื่อให้พ้นทางแยกโดยเร็วที่สุด ป้องกันอุบัติเหตุ", "rationale": "ผิด การเร่งความเร็วผ่านทางแยกที่มีป้ายหยุดเป็นอันตรายอย่างยิ่ง", "isCorrect": false }
      ],
      "hint": "คำว่า 'หยุด' ในทางกฎหมายจราจร หมายถึงรถต้องไม่มีการเคลื่อนที่เลยชั่วขณะหนึ่ง"
    },
    {
      "strand": "มารยาทและจิตสำนึก",
      "question": "หากท่านกำลังขับรถมาในเลนซ้ายสุด แล้วพบรถเมล์จอดส่งผู้โดยสารที่ป้ายรถเมล์ข้างหน้า ท่านควรปฏิบัติอย่างไร?",
      "answerOptions": [
        { "text": "บีบแตรไล่รถเมล์ให้รีบออกตัว เพื่อไม่ให้ขวางทาง", "rationale": "ผิด เป็นการเสียมารยาท และรถเมล์กำลังปฏิบัติหน้าที่รับส่งผู้โดยสาร", "isCorrect": false },
        { "text": "หักหลบเปลี่ยนเลนไปทางขวาทันทีโดยไม่ต้องเปิดไฟเลี้ยว", "rationale": "ผิด การเปลี่ยนเลนกะทันหันโดยไม่เปิดไฟเลี้ยวเป็นสาเหตุหลักของอุบัติเหตุ", "isCorrect": false },
        { "text": "ชะลอรถ ประเมินสถานการณ์ หากเลนขวาว่างและปลอดภัย จึงเปิดไฟเลี้ยวและแซงขึ้นไป", "rationale": "ถูกต้อง! การเปลี่ยนเลนต้องชะลอ มองกระจก เปิดไฟเลี้ยว และเปลี่ยนเลนเมื่อปลอดภัยเท่านั้น พร้อมระวังคนข้ามถนนหน้ารถเมล์", "isCorrect": true },
        { "text": "ขับจี้ท้ายรถเมล์อย่างใกล้ชิด เพื่อกดดันให้รถเมล์รีบขยับ", "rationale": "ผิด การขับจี้ท้ายทำให้เบรกไม่ทันหากรถเมล์เบรกกะทันหัน", "isCorrect": false }
      ],
      "hint": "หลักการขับขี่ปลอดภัยคือการวางแผนล่วงหน้า ไม่ตัดสินใจกะทันหัน และให้สัญญาณผู้อื่นเสมอ"
    },
    {
      "strand": "การขับขี่ปลอดภัยเชิงป้องกัน",
      "question": "กฎ '2 วินาที' หรือ '3 วินาที' ในการขับขี่ ใช้สำหรับวัตถุประสงค์ใด?",
      "answerOptions": [
        { "text": "เวลาที่ใช้ในการมองกระจกมองข้างก่อนเปลี่ยนเลน", "rationale": "ผิด การมองกระจกใช้เวลาสั้นกว่านั้น กฎนี้ใช้เพื่อเว้นระยะห่าง", "isCorrect": false },
        { "text": "ระยะเวลาที่ไฟเหลืองจะสว่างก่อนเปลี่ยนเป็นไฟแดง", "rationale": "ผิด สัญญาณไฟเหลืองไม่ได้กำหนดด้วยกฎ 2 วินาทีของผู้ขับขี่", "isCorrect": false },
        { "text": "ระยะห่างที่ปลอดภัยระหว่างรถของเรากับรถคันหน้า", "rationale": "ถูกต้อง! กฎ 2-3 วินาที คือการเว้นระยะห่างที่เพียงพอให้เรามีเวลาตอบสนองและเบรกได้ทัน หากรถคันหน้าเบรกกะทันหัน", "isCorrect": true },
        { "text": "เวลาสูงสุดที่อนุญาตให้ละสายตาจากถนนไปมองโทรศัพท์", "rationale": "ผิด ไม่ควรละสายตาจากถนนเลยแม้แต่วินาทีเดียว", "isCorrect": false }
      ],
      "hint": "ลองจินตนาการว่ารถคันหน้าขับผ่านเสาไฟฟ้าไป แล้วคุณนับ 1... 2... ถึงจะขับผ่านเสาไฟฟ้านั้น"
    },
    {
      "strand": "กฎหมายและป้ายจราจร",
      "question": "เส้นทึบสีเหลืองคู่ที่ตีแบ่งกึ่งกลางถนน มีความหมายตามกฎหมายจราจรอย่างไร?",
      "answerOptions": [
        { "text": "ห้ามขับรถคร่อมเส้นหรือแซงเด็ดขาด ทั้งสองฝั่ง", "rationale": "ถูกต้อง! เส้นทึบสีเหลืองคู่หมายถึงเขตห้ามแซงเด็ดขาดสำหรับรถทั้งสองทิศทาง เนื่องจากเป็นจุดอันตราย ทัศนวิสัยไม่ดี", "isCorrect": true },
        { "text": "สามารถแซงได้หากเห็นว่าข้างหน้าไม่มีรถสวนมา", "rationale": "ผิด เส้นทึบคือข้อห้ามทางกฎหมาย ไม่ว่าถนนจะว่างหรือไม่ก็ตาม", "isCorrect": false },
        { "text": "อนุญาตให้รถจักรยานยนต์แซงได้เท่านั้น", "rationale": "ผิด กฎจราจรเส้นทึบสีเหลืองคู่บังคับใช้กับยานพาหนะทุกประเภท", "isCorrect": false },
        { "text": "เป็นเส้นแบ่งเลนปกติ สามารถเลี้ยวกลับรถ (U-turn) ได้", "rationale": "ผิด ห้ามกลับรถทับเส้นทึบเด็ดขาด", "isCorrect": false }
      ],
      "hint": "สีเหลืองหมายถึงแบ่งทิศทางรถสวนกัน ส่วน 'เส้นทึบ' มีความหมายว่าห้ามข้ามหรือทับโดยเด็ดขาด"
    },
    {
      "strand": "การจัดการเหตุฉุกเฉิน",
      "question": "หากขณะขับรถด้วยความเร็วสูง แล้วยางหน้าขวาเกิดระเบิด สิ่งแรกที่ผู้ขับขี่ควรทำคืออะไร?",
      "answerOptions": [
        { "text": "เหยียบเบรกให้แรงที่สุดเพื่อหยุดรถทันที", "rationale": "ผิด การกระทืบเบรกขณะยางระเบิดจะทำให้รถเสียการทรงตัวและพลิกคว่ำได้ทันที", "isCorrect": false },
        { "text": "จับพวงมาลัยให้แน่น ประคองรถให้อยู่ในเลน แล้วค่อยๆ ถอนคันเร่ง", "rationale": "ถูกต้อง! เมื่อยางระเบิด รถจะแฉลบ ให้จับพวงมาลัยให้มั่น (ไม่หักหลบกระทันหัน) ถอนคันเร่ง ไม่กระทืบเบรก ปล่อยให้รถชะลอตัวลงเอง", "isCorrect": true },
        { "text": "ดึงเบรกมือขึ้นทันทีเพื่อช่วยชะลอความเร็ว", "rationale": "ผิด การดึงเบรกมือขณะรถวิ่งเร็วจะทำให้ล้อหลังล็อกและรถหมุนอย่างรุนแรง", "isCorrect": false },
        { "text": "หักพวงมาลัยเข้าข้างทางซ้ายสุดทันทีเพื่อหลบรถคันหลัง", "rationale": "ผิด การหักพวงมาลัยทันทีขณะเสียสมดุลจะทำให้รถคว่ำ ต้องประคองรถให้ชะลอก่อน", "isCorrect": false }
      ],
      "hint": "เมื่อยางระเบิด รถจะเสียสมดุล การใช้เบรกอย่างรุนแรงจะยิ่งเพิ่มแรงเหวี่ยงให้รถเสียการควบคุม"
    },
    {
      "strand": "กฎหมายและป้ายจราจร",

// สลับลำดับคำถาม
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

let state = {
  isStarted: false,
  studentName: '',
  studentId: '',
  studentLevel: 'อบรมโครงการขับขี่ปลอดภัย (ออนไลน์)',
  questions: [],
  current: 0,
  answers: [],
  checked: []
};

function initQuiz() {
  let shuffled = shuffleArray([...quizData.questions]);
  // สลับลำดับตัวเลือกคำตอบด้วย
  shuffled = shuffled.map(q => {
    let opts = shuffleArray([...q.answerOptions]);
    return { ...q, answerOptions: opts };
  });
  state.questions = shuffled;
  state.current = 0;
  state.answers = new Array(shuffled.length).fill(null);
  state.checked = new Array(shuffled.length).fill(false);
}

function startQuiz() {
  const nameInput = document.getElementById('input-name').value.trim();
  let idInput = document.getElementById('input-id').value.trim();
  
  if (!nameInput) {
    alert('⚠️ กรุณากรอกชื่อ-นามสกุล ของผู้เข้าอบรมก่อนเริ่มทดสอบครับ');
    return;
  }
  
  if (!idInput) {
    idInput = "ไม่ได้ระบุ";
  }

  state.studentName = nameInput;
  state.studentId = idInput;
  state.isStarted = true;
  initQuiz();
  renderApp();
}

function renderApp() {
  const app = document.getElementById('quiz-app');
  if (!state.isStarted) {
    app.innerHTML = `
      <div class="card" style="animation: fadeIn 0.4s ease; text-align: center;">
        <div class="emoji-banner">🚗 🚦 🛣️ 🛵 🚥</div>
        <h2 style="font-size: 19px; margin-bottom: 16px; color: var(--primary-dark); font-weight: 700;">ลงทะเบียนเข้าทดสอบ (Pre/Post Test)</h2>
        <p style="font-size:14.5px; color: var(--text-muted); margin-bottom:20px;">ทดสอบความรู้กฎหมายจราจร มารยาทบนท้องถนน และการขับขี่ปลอดภัยเชิงป้องกัน จำนวน 30 ข้อ</p>
        
        <div class="form-group">
          <label for="input-name">ชื่อ - นามสกุล ผู้เข้าอบรม *</label>
          <input type="text" id="input-name" class="form-control" placeholder="กรอกชื่อและนามสกุลของคุณ" required>
        </div>
        
        <div class="form-group">
          <label for="input-id">รหัสพนักงาน / เลขที่บัตรประชาชน (ทางเลือก)</label>
          <input type="text" id="input-id" class="form-control" placeholder="กรอกข้อมูลรหัส (ถ้ามี)">
        </div>
        
        <div class="form-group">
          <label>หน่วยงาน / โครงการ</label>
          <input type="text" class="form-control" value="${state.studentLevel}" disabled style="background-color: #f8fafc; font-weight: 600; color: var(--text)">
        </div>
        
        <button class="btn btn-primary" onclick="startQuiz()" style="width: 100%; margin-top: 16px; font-size: 16px;">🚦 เริ่มทำแบบทดสอบ</button>
      </div>
    `;
    return;
  }

  if (state.current >= state.questions.length) {
    renderSummary(app);
    return;
  }

  const q = state.questions[state.current];
  const pct = Math.round((state.current / state.questions.length) * 100);
  const selectedIdx = state.answers[state.current];
  const isChecked = state.checked[state.current];

  let hintHtml = q.hint ? `<div class="hint-box">💡 <b>ข้อคิดเตือนใจ:</b> ${q.hint}</div>` : '';
  
  let optionsHtml = q.answerOptions.map((opt, idx) => {
    let cls = 'option-item';
    if (selectedIdx === idx) cls += ' selected';
    if (isChecked) {
      cls += ' disabled';
      if (opt.isCorrect) cls += ' correct-reveal';
      else if (selectedIdx === idx) cls += ' wrong-reveal';
    }
    return `
      <div class="${cls}" onclick="selectAnswer(${idx})">
        <span class="radio-dot"></span>
        <div style="flex-grow:1;">${opt.text}</div>
      </div>
    `;
  }).join('');

  let feedbackHtml = '';
  if (isChecked && selectedIdx !== null) {
    const isCorrect = q.answerOptions[selectedIdx].isCorrect;
    const rationale = q.answerOptions[selectedIdx].rationale;
    feedbackHtml = `
      <div class="rationale-box ${isCorrect ? 'correct' : 'wrong'}">
        <b>${isCorrect ? '✅ ถูกต้องตามหลักเกณฑ์!' : '❌ ยังไม่ถูกต้อง'}</b> — ${rationale}
      </div>
    `;
  }

  app.innerHTML = `
    <div class="card">
      <div class="progress-container">
        <span><b>ข้อที่ ${state.current + 1} / ${state.questions.length}</b></span>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span>หมวด: <b>${q.strand}</b></span>
      </div>
      
      <div class="question-text">${q.question}</div>
      ${hintHtml}
      <div class="options-list">${optionsHtml}</div>
      ${feedbackHtml}

      <div class="nav-actions">
        <button class="btn btn-secondary" onclick="goPrev()" ${state.current === 0 ? 'disabled' : ''}>⬅️ กลับไปดูข้อก่อนหน้า</button>
        ${!isChecked ? 
          `<button class="btn btn-primary" onclick="checkAnswer()" ${selectedIdx === null ? 'disabled' : ''}>✔️ ยืนยันคำตอบ</button>` :
          `<button class="btn btn-primary" onclick="goNext()">${state.current === state.questions.length - 1 ? '🏁 ดูผลการทดสอบ' : 'ข้อต่อไป ➡️'}</button>`
        }
      </div>
    </div>
  `;
}

function renderSummary(app) {
  let score = 0;
  let reviewHtml = '';
  let strandStats = {};

  state.questions.forEach((q, i) => {
    const userAnsIdx = state.answers[i];
    const isCorrect = userAnsIdx !== null && q.answerOptions[userAnsIdx].isCorrect;
    
    if (!strandStats[q.strand]) {
      strandStats[q.strand] = { total: 0, correct: 0 };
    }
    strandStats[q.strand].total++;
    
    if (isCorrect) {
      score++;
      strandStats[q.strand].correct++;
    }

    let correctOpt = q.answerOptions.find(o => o.isCorrect);
    let userOpt = userAnsIdx !== null ? q.answerOptions[userAnsIdx] : null;

    reviewHtml += `
      <div class="review-item">
        <div style="font-weight:600;margin-bottom:8px;color:var(--text)">ข้อ ${i+1} [${q.strand}]: ${q.question}</div>
        <div style="color:${isCorrect ? 'var(--green)' : 'var(--red)'}; font-weight:600; font-size:14.5px;">
          ${isCorrect ? '🟢 ตอบถูกต้อง' : `🔴 ตอบผิด (คุณเลือก: ${userOpt ? userOpt.text : 'ไม่ได้ตอบ'})`}
        </div>
        <div style="color:var(--text-muted);font-size:14px;margin-top:8px;background:#f8fafc;padding:12px;border-radius:8px;border:1px solid #e2e8f0;line-height:1.5;">
          <b>คำอธิบาย:</b> ${correctOpt ? correctOpt.rationale : ''}
        </div>
      </div>
    `;
  });

  const pct = Math.round((score / state.questions.length) * 100);
  const isPass = pct >= 80; // เกณฑ์ผ่าน 80% สำหรับใบขับขี่/อบรมความปลอดภัย
  const grade = isPass ? "ผ่านเกณฑ์การอบรมขับขี่ปลอดภัย 🎉" : "ไม่ผ่านเกณฑ์ (ต้องได้ 80% ขึ้นไป) ⚠️";
  const gc = isPass ? "grade-pass" : "grade-fail";

  let analysisItems = '';
  for (let strand in strandStats) {
    let stat = strandStats[strand];
    let sPct = Math.round((stat.correct / stat.total) * 100);
    if (sPct < 80) {
      analysisItems += `<div class="analysis-item"><b>${strand}:</b> ทำได้ ${stat.correct}/${stat.total} ข้อ (${sPct}%) <span style="color:var(--red);font-weight:600;">[ควรทบทวน]</span></div>`;
    } else {
      analysisItems += `<div class="analysis-item" style="color:#15803d"><b>${strand}:</b> ทำได้ ${stat.correct}/${stat.total} ข้อ (${sPct}%) - ดีเยี่ยม</div>`;
    }
  }

  app.innerHTML = `
    <div class="card summary-card" style="animation: fadeIn 0.4s ease;">
      <div style="font-size:46px;margin-bottom:12px;">🏆 📋</div>
      <h2 style="font-size:22px; margin-bottom:6px; color: var(--primary-dark); font-weight:700;">ผลการทดสอบวินัยจราจรเบื้องต้น</h2>
      
      <div class="student-info-box">
        <p>👤 <b>ผู้เข้าอบรม:</b> ${state.studentName}</p>
        <p>🆔 <b>รหัส/ข้อมูลอ้างอิง:</b> ${state.studentId}</p>
      </div>

      <div style="margin:16px 0;"><span class="grade-pill ${gc}">${grade}</span></div>
      
      <div class="grid-stats">
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${score}</div><div class="slbl">ตอบถูก</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${state.questions.length - score}</div><div class="slbl">ตอบผิด</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--primary)">${pct}%</div><div class="slbl">คะแนนรวม</div></div>
      </div>

      <div class="analysis-card">
        <div class="analysis-header">📊 สรุปผลรายหมวดหมู่ (เกณฑ์ผ่าน 80%)</div>
        ${analysisItems}
      </div>
      
      <p style="font-size:13px; color:var(--text-muted); font-weight:500; margin-bottom:20px;">กรุณาจับภาพหน้าจอนี้เพื่อใช้เป็นหลักฐานการผ่านการทดสอบ</p>
      
      <button class="btn btn-primary" onclick="restartQuiz()" style="width:100%; box-shadow:none;">🔄 ทำแบบทดสอบใหม่อีกครั้ง</button>
    </div>
    
    <div class="card" style="margin-top:16px;">
      <div class="review-title">📋 เฉลยและคำอธิบายกฎหมายจราจร</div>
      ${reviewHtml}
    </div>
  `;
}

function selectAnswer(i) { if (!state.checked[state.current]) { state.answers[state.current] = i; renderApp(); } }
function checkAnswer()   { if (state.answers[state.current] !== null) { state.checked[state.current] = true; renderApp(); } }
function goNext()        { state.current++; renderApp(); }
function goPrev()        { if (state.current > 0) { state.current--; renderApp(); } }
function restartQuiz()   { state.isStarted = false; renderApp(); }

renderApp();
</script>
</body>
</html>
